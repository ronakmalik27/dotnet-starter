# CD: on a version tag (vX.Y.Z), build and push a container image to GHCR,
# then hand off to a deploy job. Target-agnostic by design - the image lands
# on GHCR and the deploy job is a clearly-marked stub the adopter wires to
# their own target. The richer release/versioning process lives in the
# companion "project-starter" template; this is the minimum a standalone
# backend repo needs to ship an image on a tag.
name: cd

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  image:
    name: Build and push image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Pin to a commit SHA for supply-chain hardening once you confirm one
      # from the release page; the major tag is used here for portability.
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      # Fast pre-push smoke: the unit + architecture suites need no Docker, so
      # they gate the image build cheaply. The integration suite (Testcontainers)
      # ran on the PR that produced this tag, so it is not repeated here.
      - name: Restore (locked)
        run: dotnet restore Starter.slnx --locked-mode
      - name: Build
        run: dotnet build Starter.slnx -c Release --no-restore
      - name: Test (unit + architecture)
        run: |
          dotnet test tests/Starter.SharedKernel.Tests/Starter.SharedKernel.Tests.csproj -c Release --no-build
          dotnet test tests/Starter.Platform.Tests/Starter.Platform.Tests.csproj -c Release --no-build
          dotnet test tests/Starter.Identity.Tests/Starter.Identity.Tests.csproj -c Release --no-build
          dotnet test tests/Starter.Architecture.Tests/Starter.Architecture.Tests.csproj -c Release --no-build
      - name: Log in to GHCR
        # pin to a commit SHA once you confirm one from the release page
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive tags and labels
        id: meta
        # pin to a commit SHA once you confirm one from the release page
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          # The git tag verbatim (vX.Y.Z, matching github.ref_name) plus the
          # commit sha, so a rollout can name either.
          tags: |
            type=ref,event=tag
            type=sha
      - name: Build and push
        # pin to a commit SHA once you confirm one from the release page
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: Deploy (stub)
    needs: image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # A GitHub environment so branch/environment protection rules (required
    # reviewers, wait timers, allowed branches) can gate the rollout. Configure
    # the "production" environment in the repo settings to enforce them.
    environment: production
    steps:
      # STUB: this job does nothing but echo. It must not fail - it is a
      # placeholder the adopter replaces with a real rollout against their
      # target. The image to roll out is
      # ghcr.io/${{ github.repository }}:${{ github.ref_name }}.
      - name: Deploy placeholder
        run: |
          echo "STUB deploy: no target wired yet."
          echo "Roll out image: ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          echo "Replace this step with your target, for example:"
          echo "  kubectl set image deployment/starter starter=ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          echo "  helm upgrade starter ./chart --set image.tag=${{ github.ref_name }}"
          echo "  <paas-cli> deploy --image ghcr.io/${{ github.repository }}:${{ github.ref_name }}"
          echo "  ssh deploy@host 'docker compose pull && docker compose up -d'"
