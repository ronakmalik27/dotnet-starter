# CI: build, test, and secret-scan every PR and every push to main.
# The richer review/gate kit (persona review commands, branch-protection
# ruleset, doc gates) lives in the companion "project-starter" template; this
# is the minimum a standalone backend repo needs to stay green.
name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test (unit + architecture)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Pin to a commit SHA for supply-chain hardening once you confirm one
      # from the release page; the major tag is used here for portability.
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore (locked)
        run: dotnet restore Starter.slnx --locked-mode
      - name: Build
        run: dotnet build Starter.slnx -c Release --no-restore
      # The unit and architecture suites need no database, so they run here
      # without Docker. The integration suite runs in its own job below.
      - name: Test (unit + architecture)
        run: |
          dotnet test tests/Starter.SharedKernel.Tests/Starter.SharedKernel.Tests.csproj -c Release --no-build
          dotnet test tests/Starter.Platform.Tests/Starter.Platform.Tests.csproj -c Release --no-build
          dotnet test tests/Starter.Identity.Tests/Starter.Identity.Tests.csproj -c Release --no-build
          dotnet test tests/Starter.Architecture.Tests/Starter.Architecture.Tests.csproj -c Release --no-build

  integration:
    name: Integration tests (Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore (locked)
        run: dotnet restore Starter.slnx --locked-mode
      - name: Build
        run: dotnet build Starter.slnx -c Release --no-restore
      # GitHub-hosted ubuntu runners ship a working Docker daemon, so
      # Testcontainers spins up the Postgres 17 the suite needs.
      - name: Test (integration)
        run: dotnet test tests/Starter.Integration.Tests/Starter.Integration.Tests.csproj -c Release --no-build

  secrets:
    name: Secrets scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install gitleaks 8.30.1 (checksum-verified)
        run: |
          set -euo pipefail
          curl -sSLo gl.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gl.tgz" | sha256sum -c -
          tar -xzf gl.tgz gitleaks && rm gl.tgz
      - name: Scan
        run: ./gitleaks detect --source . --redact
